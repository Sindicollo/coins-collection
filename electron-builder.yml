appId: com.coincollection.app
productName: Coin Collection
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: src/main/assets/fonts
    to: assets/fonts
    filter:
      - "*.ttf"
  - from: node_modules/sharp
    to: node_modules/sharp
  - from: node_modules/@img
    to: node_modules/@img
  - from: node_modules/detect-libc
    to: node_modules/detect-libc
  - from: node_modules/semver
    to: node_modules/semver
publish:
  provider: github
  releaseType: release
mac:
  category: public.app-category.collectibles
  target:
    - dmg
    - zip
  hardenedRuntime: false
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  icon: resources/icons
  category: Utility
