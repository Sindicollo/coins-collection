appId: com.coincollection.app
productName: Coin Collection
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: src/main/assets/fonts
    to: assets/fonts
    filter:
      - "*.ttf"
  - from: node_modules
    to: node_modules
    filter:
      - "**/*"
      - "!.bin/**"
      - "!.cache/**"
      - "!.yarn/**"
      - "!electron/**"
      - "!electron-*/**"
      - "!electron-builder/**"
      - "!electron-vite/**"
      - "!vite/**"
      - "!vitest/**"
      - "!@vitest/**"
      - "!typescript/**"
      - "!eslint*/**"
      - "!prettier/**"
      - "!@esbuild/**"
      - "!esbuild/**"
      - "!@testing-library/**"
      - "!jsdom/**"
      - "!@vitejs/**"
      - "!autoprefixer/**"
      - "!tailwindcss/**"
      - "!postcss/**"
      - "!@types/**"
      - "!gh-release*/**"
      - "!@electron/**"
      - "!better-sqlite3/**"
publish:
  provider: github
  releaseType: release
mac:
  category: public.app-category.collectibles
  target:
    - dmg
    - zip
  hardenedRuntime: false
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  icon: resources/icons
  category: Utility
