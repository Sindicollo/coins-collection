appId: com.coincollection.app
productName: Coin Collection
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
extraResources:
  - from: src/main/assets/fonts
    to: assets/fonts
    filter:
      - "*.ttf"
publish:
  provider: github
  releaseType: release
mac:
  category: public.app-category.collectibles
  target:
    - dmg
    - zip
  hardenedRuntime: true
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  icon: resources/icons
  category: Utility
