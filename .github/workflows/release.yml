name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (arm64)
        run: npm rebuild better-sqlite3 sharp --arch arm64

      - name: Build and package for macOS
        run: npm run dist:mac -- --githubRelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts (debug)
        run: ls -la dist/

  build-win:
    needs: build-mac
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (x64)
        run: npm rebuild better-sqlite3 sharp --arch x64

      - name: Build and package for Windows
        run: npm run dist:win -- --githubRelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts (debug)
        run: dir dist\
