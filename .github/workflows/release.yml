name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (arm64)
        run: npm rebuild better-sqlite3 sharp

      - name: Build and package for macOS
        run: npm run dist:mac -- --publish always

      - name: List artifacts (debug)
        run: ls -la dist/

  build-win:
    needs: build-mac
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (x64)
        run: npx electron-rebuild -f -w better-sqlite3,sharp -m .

      - name: Build and package for Windows
        run: npm run dist:win -- --publish always

      - name: List artifacts (debug)
        run: dir dist\
